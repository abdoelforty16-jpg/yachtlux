<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Yacht Contact</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Segoe UI',sans-serif;
background:
linear-gradient(135deg,#0f172a,#1e293b,#111827);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

/* CARD */

.luxury-box{

width:100%;
max-width:480px;
padding:35px;
border-radius:30px 10px 30px 10px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:
0 20px 40px rgba(0,0,0,.35);
transition:.4s;
}

.luxury-box:hover{
transform:translateY(-5px);
}

/* TITLE */

.title{
text-align:center;
margin-bottom:30px;
color:white;
}

.title i{
font-size:38px;
margin-bottom:15px;
color:#d4af37;
}

.title h2{
font-size:32px;
font-weight:700;
letter-spacing:1px;
}

.title p{
margin-top:8px;
font-size:14px;
color:#cbd5e1;
}

/* INPUTS */

.input-box{
position:relative;
margin-bottom:18px;
}

.input-box i{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
color:#d4af37;
font-size:15px;
}

.input-box input,
.input-box textarea{
width:100%;
padding:15px 15px 15px 45px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.1);
color:white;
font-size:15px;
transition:.3s;
}

.input-box textarea{
height:110px;
resize:none;
padding-top:18px;
}

.input-box input::placeholder,
.input-box textarea::placeholder{
color:#d1d5db;
}

.input-box input:focus,
.input-box textarea:focus{
background:rgba(255,255,255,0.16);
box-shadow:
0 0 0 3px rgba(212,175,55,.25);
}

/* BUTTON */

#submitBtn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:bold;
cursor:pointer;
background:
linear-gradient(135deg,#d4af37,#b9925e);
color:white;
transition:.3s;
box-shadow:
0 10px 25px rgba(212,175,55,.35);
}

#submitBtn:hover{
transform:translateY(-2px);
box-shadow:
0 14px 28px rgba(212,175,55,.5);
}

/* SEARCH */

.search-box{
margin-top:22px;
position:relative;
}

.search-box i{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
color:#d4af37;
}

.search-box input{
width:100%;
padding:14px 14px 14px 45px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.1);
color:white;
font-size:15px;
}

.search-box input::placeholder{
color:#d1d5db;
}

/* LIST */

#userList{
list-style:none;
margin-top:25px;
}

#userList li{
padding:16px;
margin-bottom:15px;
border-radius:14px;
background:rgba(255,255,255,0.08);
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
color:white;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
}

.actions button{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.edit{
background:#d4af37;
color:white;
}

.delete{
background:#dc3545;
color:white;
}
.actions button:hover{
transform:scale(1.05);
}

/* MOBILE */
@media(max-width:600px){
.luxury-box{
padding:25px;
}
.title h2{
font-size:26px;
}
#userList li{
flex-direction:column;
align-items:flex-start;
}
.actions{
width:100%;
}
.actions button{
flex:1;
}
}

</style>

</head>

<body>

<div class="luxury-box">

<div class="title">
<i class="fa-solid fa-anchor"></i>
<h2>Luxury Users</h2>
<p>Manage client emails</p>

</div>

<form id="crudForm">
<div class="input-box">
<i class="fa-solid fa-user"></i>

<input
type="text"
id="name"
placeholder="Full Name"
required>
</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>
</div>

<button id="submitBtn">
    <i class="fa-solid fa-plus"></i> Add
</button>

</form>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
id="search"
placeholder="Search users...">

</div>
<!-- USERS -->
    <div class="card">
<ul id="userList"></ul>

</div>
<script src="assets/js/crud.js"></script>
</body>
</html>
